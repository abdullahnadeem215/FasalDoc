# .github/workflows/build-apk.yml
name: Build FasalDoc APK

on:
  push:
    branches: [ main ]  # Triggers the build when you push code to your 'main' branch

jobs:
  build:
    runs-on: ubuntu-latest  # Uses a fresh Linux environment for the build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Pulls your latest code from GitHub

      - name: Set up Java & Node
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install  # Installs all required packages

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
        # Takes the keystore saved as a secret and turns it back into a file

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease  # Runs the Gradle command to build the APK

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FasalDoc-APK
          path: android/app/build/outputs/apk/release/app-release.apk
        # Saves the finished APK as a downloadable file you can access from the GitHub Actions page.
